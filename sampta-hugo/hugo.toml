# Hugo site configuration for SampTA Conference Series
baseURL = "https://sampta.org/"
languageCode = "en"
title = "SampTA — Sampling Theory and Applications"
enableRobotsTXT = true
# No external theme — using custom layouts
# Disable unused features for faster builds
disableKinds = ["taxonomy", "term"]

[params]
  description = "SampTA is a biennial interdisciplinary conference for mathematicians, engineers, and applied scientists."
  contactEmail = "info@sampta.org"
  upcomingContentRawURL = "https://raw.githubusercontent.com/CentralSampTA/site-upcoming-content/main/content/upcoming.md"
  upcomingContentSiteURL = "https://upcoming.sampta.org"
  # Public URL of the Brevo hosted sign-up page for the announcements list.
  # Paste the form's shareable URL here once the Brevo form is created
  # (see BREVO_SETUP.md, Part E/F). Leave empty to hide the sign-up button
  # (a placeholder note shows instead). When set, the home-page card and the
  # /newsletter/ page render a "Subscribe to announcements →" button.
  newsletterSignupURL = "https://9955a7a7.sibforms.com/serve/MUIFACn_7YNTFOntRVLsEr08UzmVxikkdHr0oH-mRP1dH_YKEnhL-C1o3lmbFujdJsCoZiY4DmY29tc7e-3lp3oL7czJs1gXz8UU_D5suhczNS8SbFK2bi82jTFo_dqcvi-Bqef_YQx6kMMlI3FrfczKJkrmWNIn4Isvlwg0oYCV2xg6z-ROaWA5WAWYyLpf1U_MqlP-JueyxrQSyQ=="

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Upcoming"
    url = "/upcoming/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3
  [[menu.main]]
    name = "Conferences"
    url = "/conferences/"
    weight = 4
  [[menu.main]]
    name = "Committee"
    url = "/committee/"
    weight = 5
  [[menu.main]]
    name = "Resources"
    url = "/resources/"
    weight = 6
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 7

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Always refetch the remote "upcoming" content on every build.
# Default getresource maxAge is -1 (cache forever), which serves stale
# content across builds; 0 disables the cache so each deploy pulls fresh.
[caches]
  [caches.getresource]
    dir = ":cacheDir/:project"
    maxAge = "0s"
