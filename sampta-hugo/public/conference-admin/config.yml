# --------------------------------------------------------
# This config restricts users so they ONLY see the "Upcoming" page
# --------------------------------------------------------
backend:
  name: github
  repo: CentralSampTA/SampTA
  branch: main

# To ensure conference admins don't accidentally break the live site, 
# you can flip this flag on. It makes their changes save as Github 
# Pull Requests ("Drafts") rather than pushing live immediately.
# publish_mode: editorial_workflow 

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "conference"
    label: "Upcoming Details"
    description: "Edit the upcoming SampTA conference page. Changes here immediately reflect on the homepage and the Upcoming subpage."
    editor:
      preview: false
    files:
      - label: "Upcoming Conference"
        name: "upcoming"
        file: "sampta-hugo/content/upcoming.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string", hint: "e.g. SampTA 27 — Utrecht, July 2027"}
          - {label: "Description", name: "description", widget: "text", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
